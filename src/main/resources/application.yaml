spring:
  application:
    name: PicLocket

  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      sqs:
        queue-not-found-strategy: fail

aws:
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET}

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

pic-locket:
  sqs:
    queue: ${SQS_QUEUE_NAME}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}
  cleanup:
    fixed-delay-ms: ${PHOTO_CLEANUP_FIXED_DELAY_MS:300000}
